<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ff5500">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="RetsAlerte">
<title>RetsAlerte</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

:root{
  --bg:#121214;--s1:#1a1a1e;--s2:#1f1f24;--s3:#26262c;
  --or:#ff5500;--or2:#ff7a3d;--or3:#ffaa77;
  --red:#ff2d55;--amber:#ffcc00;--green:#30d158;--blue:#0a84ff;
  --ink:#ffffff;--ink2:rgba(255,255,255,.85);--ink3:rgba(255,255,255,.45);--ink4:rgba(255,255,255,.2);
  --bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.11);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:"Inter",sans-serif;background:var(--bg);color:var(--ink);display:flex;flex-direction:column;}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse 600px 400px at 80% -10%,rgba(255,85,0,.1) 0%,transparent 55%);pointer-events:none;z-index:0;}

/* -- HEADER -- */
.hdr{
  padding:calc(var(--safe-top) + 14px) 18px 14px;
  background:rgba(18,18,20,.97);border-bottom:1px solid var(--bd);
  display:flex;align-items:center;gap:12px;position:relative;z-index:10;
  flex-shrink:0;
}
.hdr-logo{width:36px;height:36px;background:var(--or);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;font-size:16px;animation:hexPulse 4s ease-in-out infinite;flex-shrink:0;}
@keyframes hexPulse{0%,100%{filter:drop-shadow(0 0 5px rgba(255,85,0,.4))}50%{filter:drop-shadow(0 0 16px rgba(255,85,0,.9))}}
.hdr-info{flex:1;}
.hdr-title{font-family:"Bebas Neue",sans-serif;font-size:1.2rem;letter-spacing:4px;line-height:1;}
.hdr-title em{color:var(--or);font-style:normal;}
.hdr-sub{font-family:"JetBrains Mono",monospace;font-size:.5rem;letter-spacing:2px;color:var(--ink3);margin-top:2px;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.notif-btn{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.06);border:1px solid var(--bd);color:var(--ink3);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .18s;}
.notif-btn.on{background:rgba(255,85,0,.15);border-color:rgba(255,85,0,.3);color:var(--or2);}
.install-btn{padding:6px 12px;border-radius:8px;background:linear-gradient(135deg,var(--or),var(--or2));border:none;color:#fff;cursor:pointer;font-family:"Bebas Neue",sans-serif;font-size:.75rem;letter-spacing:2px;display:none;transition:all .18s;}
.install-btn.show{display:flex;align-items:center;gap:5px;}

/* -- TABS -- */
.tabs{display:flex;background:rgba(18,18,20,.97);border-bottom:1px solid var(--bd);flex-shrink:0;position:relative;z-index:9;}
.tab{flex:1;padding:12px 8px;border:none;background:transparent;color:var(--ink3);cursor:pointer;font-family:"JetBrains Mono",monospace;font-size:.56rem;letter-spacing:2px;text-transform:uppercase;transition:all .18s;display:flex;flex-direction:column;align-items:center;gap:4px;position:relative;}
.tab .t-ico{font-size:1.1rem;}
.tab.on{color:var(--or2);}
.tab.on::after{content:"";position:absolute;bottom:0;left:20%;right:20%;height:2px;background:var(--or);border-radius:2px 2px 0 0;}
.tab .t-badge{min-width:16px;height:16px;border-radius:8px;background:var(--red);color:#fff;font-size:.5rem;padding:0 4px;display:flex;align-items:center;justify-content:center;position:absolute;top:6px;right:calc(50% - 18px);}
.tab .t-badge.hide{display:none;}

/* -- SCREENS -- */
.screens{flex:1;overflow:hidden;position:relative;}
.screen{position:absolute;inset:0;overflow-y:auto;padding:16px 14px calc(var(--safe-bot) + 16px);display:none;animation:scrIn .25s ease;}
.screen.on{display:block;}
@keyframes scrIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* -- LOGIN SCREEN -- */
.login-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;padding:30px 20px;}
.login-logo{width:70px;height:70px;background:var(--or);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:20px;animation:hexPulse 3s ease-in-out infinite;}
.login-title{font-family:"Bebas Neue",sans-serif;font-size:2rem;letter-spacing:6px;margin-bottom:6px;}
.login-title em{color:var(--or);font-style:normal;}
.login-sub{font-size:.8rem;color:var(--ink3);margin-bottom:32px;text-align:center;}
.login-card{width:100%;max-width:340px;background:rgba(255,255,255,.04);border:1px solid var(--bd);border-radius:16px;padding:24px;}
.login-label{font-family:"JetBrains Mono",monospace;font-size:.54rem;letter-spacing:2px;color:var(--ink3);text-transform:uppercase;display:block;margin-bottom:8px;}
.login-select{width:100%;background:rgba(255,255,255,.06);border:1px solid var(--bd2);color:var(--ink);border-radius:10px;padding:12px 14px;font-family:"Inter",sans-serif;font-size:.9rem;outline:none;margin-bottom:16px;appearance:none;cursor:pointer;}
.login-select option{background:#1a1a1e;color:#fff;}
.login-btn{width:100%;padding:14px;border-radius:12px;background:linear-gradient(135deg,var(--or),var(--or2));border:none;color:#fff;cursor:pointer;font-family:"Bebas Neue",sans-serif;font-size:1.1rem;letter-spacing:4px;transition:all .2s;box-shadow:0 4px 20px rgba(255,85,0,.3);}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(255,85,0,.4);}
.login-or{text-align:center;font-size:.72rem;color:var(--ink4);margin:12px 0;}
.login-guest{width:100%;padding:11px;border-radius:12px;background:rgba(255,255,255,.06);border:1px solid var(--bd);color:var(--ink3);cursor:pointer;font-family:"Inter",sans-serif;font-size:.85rem;transition:all .18s;}
.login-guest:hover{background:rgba(255,255,255,.1);}

/* -- KPI ROW -- */
.kpi-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.kpi{border-radius:14px;padding:16px;position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.07);}
.kpi.kr{background:linear-gradient(145deg,#2d1520,#1a0d16);}
.kpi.ka{background:linear-gradient(145deg,#2a1f08,#1a1402);}
.kpi.kg{background:linear-gradient(145deg,#0c2718,#071a0f);}
.kpi.ko{background:linear-gradient(145deg,#2a1508,#1c0d04);}
.kpi::before{content:"";position:absolute;top:-30px;right:-30px;width:80px;height:80px;border-radius:50%;filter:blur(25px);opacity:.5;}
.kpi.kr::before{background:var(--red);}
.kpi.ka::before{background:var(--amber);}
.kpi.kg::before{background:var(--green);}
.kpi.ko::before{background:var(--or);}
.kpi-n{font-family:"Bebas Neue",sans-serif;font-size:2.4rem;letter-spacing:2px;line-height:1;}
.kpi.kr .kpi-n{color:var(--red);}
.kpi.ka .kpi-n{color:var(--amber);}
.kpi.kg .kpi-n{color:var(--green);}
.kpi.ko .kpi-n{color:var(--or2);}
.kpi-l{font-size:.6rem;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1.5px;font-weight:600;margin-top:3px;}

/* -- CARDS -- */
.card-list{display:flex;flex-direction:column;gap:8px;}
.card{background:rgba(255,255,255,.04);border:1px solid var(--bd);border-radius:14px;overflow:hidden;display:grid;grid-template-columns:4px 1fr;transition:all .2s;cursor:pointer;}
.card:active{transform:scale(.98);}
@keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.cbar{}
.card.su .cbar{background:var(--red);box-shadow:2px 0 12px rgba(255,45,85,.4);}
.card.sw .cbar{background:var(--amber);}
.card.sk .cbar{background:var(--green);}
.card.sd .cbar{background:rgba(255,255,255,.1);}
.cbody{padding:14px 14px;}
.ctop{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:6px;}
.cid{font-family:"Bebas Neue",sans-serif;font-size:1rem;letter-spacing:2px;cursor:pointer;transition:color .15s;}
.cid:hover{color:var(--or2);}
.cid-copied{color:var(--green)!important;}
.ctech{font-size:.85rem;font-weight:600;color:var(--ink2);margin-bottom:5px;}
.cmeta{display:flex;flex-direction:column;gap:3px;font-size:.72rem;color:var(--ink3);}
.cdn-row{display:flex;align-items:center;justify-content:space-between;margin-top:10px;}
.cdn{font-family:"Bebas Neue",sans-serif;font-size:1.6rem;letter-spacing:2px;}
.card.su .cdn{color:var(--red);text-shadow:0 0 14px rgba(255,45,85,.4);}
.card.sw .cdn{color:var(--amber);}
.card.sk .cdn{color:var(--green);}
.card.sd .cdn{color:var(--ink3);}
@keyframes cdBlink{0%,100%{opacity:1}50%{opacity:.2}}
.cdn.blink{animation:cdBlink 1s ease-in-out infinite;}

/* -- CLÔTURE BTN -- */
.cloture-btn{
  padding:8px 14px;border-radius:9px;border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.06);color:var(--ink3);cursor:pointer;
  font-family:"JetBrains Mono",monospace;font-size:.58rem;letter-spacing:1px;text-transform:uppercase;
  transition:all .2s;display:flex;align-items:center;gap:5px;
}
.cloture-btn:active{transform:scale(.95);}
.cloture-btn.done{background:rgba(48,209,88,.12);border-color:rgba(48,209,88,.3);color:var(--green);cursor:default;}
.cloture-btn.pending{background:rgba(255,204,0,.1);border-color:rgba(255,204,0,.25);color:var(--amber);}

/* TAGS */
.tag{font-family:"JetBrains Mono",monospace;font-size:.5rem;letter-spacing:1px;padding:3px 7px;border-radius:5px;text-transform:uppercase;}
.t-pms,.t-pmsfth{background:rgba(255,85,0,.14);color:var(--or2);border:1px solid rgba(255,85,0,.24);}
.t-pli,.t-plifth{background:rgba(48,209,88,.09);color:var(--green);border:1px solid rgba(48,209,88,.19);}
.t-esc,.t-escfth{background:rgba(255,204,0,.09);color:var(--amber);border:1px solid rgba(255,204,0,.2);}
.t-pmr,.t-pmrfth{background:rgba(10,132,255,.09);color:var(--blue);border:1px solid rgba(10,132,255,.2);}
.t-su{background:rgba(255,45,85,.14);color:var(--red);border:1px solid rgba(255,45,85,.28);}
.t-sw{background:rgba(255,204,0,.09);color:var(--amber);border:1px solid rgba(255,204,0,.2);}
.t-sk{background:rgba(48,209,88,.07);color:var(--green);border:1px solid rgba(48,209,88,.17);}
.t-sd{background:rgba(255,255,255,.05);color:var(--ink3);border:1px solid var(--bd);}

/* EMPTY */
.empty{text-align:center;padding:48px 20px;border:1px dashed rgba(255,255,255,.07);border-radius:14px;font-family:"JetBrains Mono",monospace;font-size:.6rem;letter-spacing:3px;color:var(--ink4);text-transform:uppercase;}
.ei{font-size:1.8rem;margin-bottom:10px;display:block;opacity:.2;}

/* SEC HDR */
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.sec-ttl{font-family:"JetBrains Mono",monospace;font-size:.56rem;letter-spacing:4px;color:var(--ink3);text-transform:uppercase;display:flex;align-items:center;gap:8px;}
.sec-ttl::before{content:"";width:12px;height:1px;background:var(--or);flex-shrink:0;}
.sec-pill{font-family:"JetBrains Mono",monospace;font-size:.54rem;color:var(--ink4);background:rgba(255,255,255,.04);border:1px solid var(--bd);padding:3px 10px;border-radius:20px;}

/* NOTIF BANNER */
.notif-banner{display:none;align-items:center;gap:12px;background:rgba(255,85,0,.08);border:1px solid rgba(255,85,0,.25);border-radius:12px;padding:14px;margin-bottom:14px;}
.notif-banner.show{display:flex;animation:pIn .3s ease;}
@keyframes pIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.notif-banner-txt{flex:1;font-size:.78rem;color:var(--ink2);}
.notif-banner-txt strong{color:var(--or2);display:block;margin-bottom:2px;font-family:"Bebas Neue",sans-serif;font-size:.9rem;letter-spacing:2px;}
.notif-allow{padding:7px 14px;border-radius:8px;background:var(--or);border:none;color:#fff;cursor:pointer;font-family:"Bebas Neue",sans-serif;font-size:.8rem;letter-spacing:2px;flex-shrink:0;}

/* PROFIL BADGE */
.profil-badge{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.04);border:1px solid var(--bd);border-radius:12px;padding:12px 14px;margin-bottom:16px;}
.profil-av{width:38px;height:38px;border-radius:10px;background:rgba(255,85,0,.15);border:1px solid rgba(255,85,0,.25);display:flex;align-items:center;justify-content:center;font-family:"Bebas Neue",sans-serif;font-size:1rem;color:var(--or2);}
.profil-name{font-weight:600;font-size:.9rem;}
.profil-sub{font-size:.7rem;color:var(--ink3);margin-top:2px;}
.profil-logout{margin-left:auto;padding:6px 12px;border-radius:8px;background:rgba(255,255,255,.06);border:1px solid var(--bd);color:var(--ink3);cursor:pointer;font-size:.72rem;transition:all .18s;}
.profil-logout:hover{border-color:var(--red);color:var(--red);}

/* MODAL CLÔTURE */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(12px);z-index:500;display:none;align-items:flex-end;justify-content:center;padding-bottom:var(--safe-bot);}
.overlay.open{display:flex;animation:ovIn .2s ease;}
@keyframes ovIn{from{opacity:0}to{opacity:1}}
.modal{background:rgba(26,26,30,.98);border:1px solid rgba(255,255,255,.1);border-radius:22px 22px 0 0;width:100%;max-width:500px;padding:24px;box-shadow:0 -16px 48px rgba(0,0,0,.6);animation:modalUp .3s cubic-bezier(.34,1.2,.64,1);}
@keyframes modalUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,.15);margin:0 auto 20px;}
.modal-title{font-family:"Bebas Neue",sans-serif;font-size:1.4rem;letter-spacing:4px;margin-bottom:4px;}
.modal-sub{font-size:.75rem;color:var(--ink3);margin-bottom:20px;}
.modal-field{margin-bottom:14px;}
.modal-label{font-family:"JetBrains Mono",monospace;font-size:.52rem;letter-spacing:2px;color:var(--ink3);text-transform:uppercase;display:block;margin-bottom:7px;}
.modal-inp{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:var(--ink);border-radius:10px;padding:12px 14px;font-family:"Inter",sans-serif;font-size:.9rem;outline:none;transition:border-color .15s;}
.modal-inp:focus{border-color:rgba(255,85,0,.4);box-shadow:0 0 0 3px rgba(255,85,0,.07);}
.modal-status{display:flex;gap:8px;margin-bottom:20px;}
.msbtn{flex:1;padding:11px 8px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:var(--ink3);cursor:pointer;font-family:"JetBrains Mono",monospace;font-size:.6rem;letter-spacing:1px;text-transform:uppercase;transition:all .18s;text-align:center;}
.msbtn.on.cloture{background:rgba(48,209,88,.14);border-color:rgba(48,209,88,.32);color:var(--green);}
.msbtn.on.rdv{background:rgba(255,204,0,.1);border-color:rgba(255,204,0,.28);color:var(--amber);}
.msbtn.on.contact{background:rgba(10,132,255,.1);border-color:rgba(10,132,255,.25);color:var(--blue);}
.modal-confirm{width:100%;padding:14px;border-radius:12px;background:linear-gradient(135deg,var(--or),var(--or2));border:none;color:#fff;cursor:pointer;font-family:"Bebas Neue",sans-serif;font-size:1.05rem;letter-spacing:4px;transition:all .18s;box-shadow:0 4px 20px rgba(255,85,0,.3);}
.modal-confirm:active{transform:scale(.98);}
.modal-cancel{width:100%;padding:11px;border-radius:12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:var(--ink3);cursor:pointer;font-family:"Inter",sans-serif;font-size:.85rem;margin-top:8px;transition:all .18s;}

/* TOAST */
#toasts{position:fixed;top:calc(var(--safe-top) + 70px);right:14px;display:flex;flex-direction:column;gap:7px;z-index:9999;}
.toast{background:rgba(26,26,30,.97);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-left:3px solid var(--or);border-radius:10px;padding:10px 14px;font-size:.78rem;color:var(--ink2);box-shadow:0 6px 24px rgba(0,0,0,.5);animation:tIn .3s cubic-bezier(.34,1.4,.64,1) both;max-width:260px;}
@keyframes tIn{from{opacity:0;transform:translateX(24px)}}
@keyframes tOut{to{opacity:0;transform:translateX(24px)}}
.toast.out{animation:tOut .2s ease forwards;}
.toast.t-red{border-left-color:var(--red);}
.toast.t-green{border-left-color:var(--green);}
.toast.t-amber{border-left-color:var(--amber);}

.profil-avatar{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,#ff5500,#ff7a3d);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:1.6rem;margin:0 auto 10px;box-shadow:0 8px 24px rgba(255,85,0,.3);}
.profil-name{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:3px;text-align:center;}
.profil-role{font-size:.55rem;color:rgba(255,255,255,.45);letter-spacing:2px;text-align:center;margin-bottom:16px;}
.profil-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.stat{background:#1f1f24;border-radius:12px;padding:10px;text-align:center;border:1px solid rgba(255,255,255,.07);}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;}
.stat-lbl{font-size:.5rem;color:rgba(255,255,255,.45);letter-spacing:1px;text-transform:uppercase;}
#loginError{color:#ff2d55;font-size:.6rem;margin:4px 0 10px;display:none;font-family:'JetBrains Mono',monospace;}
</style>
</head>
<body>

<div id="loginScreen" style="position:fixed;inset:0;z-index:200;background:#121214;overflow-y:auto;">
  <div class="login-wrap">
    <div class="login-logo">R</div>
    <div class="login-title">RETS<em>ALERTE</em></div>
    <div class="login-sub">Application techniciens - FTTH</div>
    <div class="login-card">
      <label class="login-label">Identifiant</label>
      <input type="text" class="login-select" id="loginInput" placeholder="XXXXX@LOB62"
        autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false"
        style="text-transform:uppercase;letter-spacing:2px;">
      <div id="loginError">Identifiant non reconnu</div>
      <button class="login-btn" id="btnLogin">ACCEDER A MES DOSSIERS</button>
      <div class="login-or">ou</div>
      <button class="login-guest" id="btnGuest">Voir tous les dossiers</button>
    </div>
  </div>
</div>

<div id="appShell" style="display:none;flex-direction:column;height:100%;">
  <div class="hdr">
    <div class="hdr-logo">R</div>
    <div class="hdr-info">
      <div class="hdr-title">RETS<em>ALERTE</em></div>
      <div class="hdr-sub" id="hdrSub">Chargement...</div>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" id="tab-mes" onclick="goTab('mes')">
      <span class="tab-icon">&#128203;</span>MES<span class="tab-badge" id="badge-mes"></span>
    </div>
    <div class="tab" id="tab-urg" onclick="goTab('urg')">
      <span class="tab-icon">&#128308;</span>URGENTS<span class="tab-badge" id="badge-urg"></span>
    </div>
    <div class="tab" id="tab-all" onclick="goTab('all')">
      <span class="tab-icon">&#128193;</span>TOUS
    </div>
    <div class="tab" id="tab-profil" onclick="goTab('profil')">
      <span class="tab-icon">&#128100;</span>PROFIL
    </div>
  </div>
  <div style="flex:1;overflow-y:auto;padding:12px;">
    <div id="view-mes">
      <div class="kpi-row" style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px;">
        <div class="kpi red"><div class="kpi-val" id="kpi-urg">0</div><div class="kpi-lbl">Urgents</div></div>
        <div class="kpi amber"><div class="kpi-val" id="kpi-warn">0</div><div class="kpi-lbl">Bientot</div></div>
        <div class="kpi green"><div class="kpi-val" id="kpi-clot">0</div><div class="kpi-lbl">Clotures</div></div>
        <div class="kpi or"><div class="kpi-val" id="kpi-tot">0</div><div class="kpi-lbl">Total</div></div>
      </div>
      <div id="list-mes"></div>
    </div>

function initData(raw){
  D=raw.map(function(d){
    var cr=parseDate(d.date_creation);
    var perc=cr?new Date(cr.getTime()+48*3600000):null;
    return Object.assign({percution:perc},d);
  });
}
function parseDate(s){
  if(!s)return null;
  var m=s.match(/(\d{2})\/(\d{2})\/(\d{4})\s+(\d{2}):(\d{2})/);
  if(!m)return null;
  return new Date(m[3],m[2]-1,m[1],m[4],m[5]);
}
function st(perc){
  if(!perc)return'ok';
  var diff=(perc-Date.now())/60000;
  if(diff<0)return'percute';
  if(diff<120)return'urgent';
  if(diff<240)return'warning';
  return'ok';
}
function stTag(perc){
  var s=st(perc);
  var labels={percute:'PERCUTE',urgent:'URGENT',warning:'BIENTOT',ok:'OK'};
  var colors={percute:'red',urgent:'red',warning:'amber',ok:'green'};
  return'<span class="tag '+colors[s]+'">'+labels[s]+'</span>';
}
function countdown(perc){
  if(!perc)return'--:--:--';
  var diff=perc-Date.now();
  if(diff<0)return'00:00:00';
  var h=Math.floor(diff/3600000);
  var m=Math.floor((diff%3600000)/60000);
  var s=Math.floor((diff%60000)/1000);
  return(h<10?'0':'')+h+':'+(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
}
function doLogin(){
  try{
    var inp=document.getElementById('loginInput');
    var input=(inp.value||'').trim().toUpperCase().replace(/\s/g,'');
    if(!input){alert('Entrez votre identifiant');return;}
    var user=USERS[input];
    if(!user){
      document.getElementById('loginError').style.display='block';
      setTimeout(function(){document.getElementById('loginError').style.display='none';},3000);
      return;
    }
    currentUser=user.nom;
    currentUserInfo=user;
    isGuest=false;
    try{localStorage.setItem('ruser',user.nom);localStorage.setItem('ruserinfo',JSON.stringify(user));}catch(e){}
    startApp();
  }catch(e){alert('Erreur: '+e.message);}
}
function doGuest(){
  currentUser=null;currentUserInfo=null;isGuest=true;startApp();
}
function startApp(){
  document.getElementById('loginScreen').style.display='none';
  var app=document.getElementById('appShell');
  app.style.display='flex';app.style.flexDirection='column';app.style.height='100%';
  updateApp();
  setInterval(function(){updateCountdowns();},1000);
  setInterval(function(){loadSheets();},300000);
  loadSheets();
}
function doLogout(){
  currentUser=null;currentUserInfo=null;isGuest=false;
  try{localStorage.removeItem('ruser');localStorage.removeItem('ruserinfo');}catch(e){}
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('appShell').style.display='none';
}
function updateApp(){
  var user=currentUser;
  var myD=user?D.filter(function(d){return d.tech&&d.tech.toUpperCase()===user.toUpperCase();}):D;
  var allUrg=D.filter(function(d){return st(d.percution)==='urgent';});
  var dispName=currentUserInfo?(currentUserInfo.prenom+' '+currentUserInfo.nom).trim():user||'Administrateur';
  document.getElementById('hdrSub').textContent=user?('Bonjour '+dispName):'Vue admin';
  var urgCnt=myD.filter(function(d){return st(d.percution)==='urgent';}).length;
  var warnCnt=myD.filter(function(d){return st(d.percution)==='warning';}).length;
  var clotCnt=Object.keys(clotures).filter(function(k){return myD.find(function(d){return d.id===k;});}).length;
  document.getElementById('kpi-urg').textContent=urgCnt;
  document.getElementById('kpi-warn').textContent=warnCnt;
  document.getElementById('kpi-clot').textContent=clotCnt;
  document.getElementById('kpi-tot').textContent=myD.length;
  document.getElementById('badge-urg').textContent=allUrg.length||'';
  document.getElementById('badge-mes').textContent=myD.length||'';
  renderCards(myD,'list-mes');
  renderCards(allUrg,'list-urg');
  renderCards(D,'list-all');
  renderProfil();
}
function renderCards(list,cid){
  var el=document.getElementById(cid);if(!el)return;
  if(!list.length){el.innerHTML='<div class="empty">Aucun dossier</div>';return;}
  var order={percute:0,urgent:1,warning:2,ok:3};
  var sorted=list.slice().sort(function(a,b){return(order[st(a.percution)]||3)-(order[st(b.percution)]||3);});
  el.innerHTML=sorted.map(function(d){return cardHTML(d);}).join('');
}
function cardHTML(d){
  var s=st(d.percution);var clot=clotures[d.id];
  var bar=clot?'green':s==='urgent'||s==='percute'?'red':s==='warning'?'amber':'green';
  var cdColor=s==='urgent'||s==='percute'?'#ff2d55':s==='warning'?'#ffcc00':'#30d158';
  return'<div class="card'+(s==='urgent'?' urgent':'')+'" onclick="openModal(\''+d.id+'\')">'+
    '<div class="card-bar '+bar+'"></div><div class="card-body">'+
    '<div class="card-top"><span class="cid" onclick="event.stopPropagation();copyND(\'0'+d.id+'\',this)">0'+d.id+'</span>'+
    '<span class="tag blue">'+d.actprod+'</span>'+stTag(d.percution)+
    (clot?'<span class="tag green">'+clot.statut+'</span>':'')+
    '</div><div class="card-tech">'+d.tech+' - '+d.ville+'</div>'+
    '<div class="card-meta">'+d.planifiee+'</div>'+
    '<div class="card-footer"><span class="countdown" style="color:'+cdColor+'">'+countdown(d.percution)+'</span>'+
    (clot?'<span class="btn-clot done">Cloture</span>':'<button class="btn-clot" onclick="event.stopPropagation();openModal(\''+d.id+'\')">Cloturer</button>')+
    '</div></div></div>';
}
function renderProfil(){
  var el=document.getElementById('profil-content');if(!el)return;
  var user=currentUser;
  var myD=user?D.filter(function(d){return d.tech&&d.tech.toUpperCase()===user.toUpperCase();}):D;
  var clotD=myD.filter(function(d){return clotures[d.id];});
  var initials=currentUserInfo?currentUserInfo.nom.substring(0,2):user?user.substring(0,2):'AD';

  el.innerHTML='<div class="profil-avatar">'+initials+'</div>'+
    '<div class="profil-name">'+dispName+'</div>'+

    '</div><button onclick="doLogout()" style="width:100%;padding:11px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:11px;color:rgba(255,255,255,.5);font-size:.7rem;letter-spacing:2px;cursor:pointer;">CHANGER DE COMPTE</button>';
}
function updateCountdowns(){

    var card=el.closest('.card');if(!card)return;
    var cidEl=card.querySelector('.cid');if(!cidEl)return;
    var nd=cidEl.textContent.replace(/^0/,'');
    var d=D.find(function(x){return x.id===nd;});
    if(d&&d.percution)el.textContent=countdown(d.percution);
  });
}
var curTab='mes';
function goTab(tab){
  curTab=tab;
  ['mes','urg','all','profil'].forEach(function(t){
    var el=document.getElementById('tab-'+t);
    var content=document.getElementById('view-'+t);
    if(el)el.classList.toggle('active',t===tab);
    if(content)content.style.display=t===tab?'block':'none';
  });
}
var modalDossier=null;
function openModal(id){
  modalDossier=id;
  var d=D.find(function(x){return x.id===id;});if(!d)return;
  document.getElementById('modal-id').textContent='0'+d.id;
  document.getElementById('modal-info').textContent=d.tech+' - '+d.ville;
  document.querySelectorAll('.modal-btn').forEach(function(b){b.classList.remove('selected');});

function closeModal(){document.getElementById('modal').style.display='none';modalDossier=null;}
function selStatus(s){
  document.querySelectorAll('.modal-btn').forEach(function(b){b.classList.remove('selected');});
  var btn=document.getElementById('btn-'+s);if(btn)btn.classList.add('selected');
}
function confirmCloture(){
  if(!modalDossier)return;
  var sel=document.querySelector('.modal-btn.selected');
  if(!sel){alert('Selectionnez un statut');return;}
  clotures[modalDossier]={statut:sel.dataset.statut,ts:new Date().toISOString(),tech:currentUser};
  try{localStorage.setItem('rclotures',JSON.stringify(clotures));}catch(e){}
  closeModal();updateApp();toast('Dossier cloture: '+sel.dataset.statut,'t-green');
}
function copyND(nd,el){
  try{
    navigator.clipboard.writeText(nd).then(function(){
      var orig=el.textContent;el.textContent='Copie!';el.style.color='#30d158';
      setTimeout(function(){el.textContent=orig;el.style.color='';},1500);
    });
  }catch(e){}
}
function toast(msg,cls){
  var t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show '+(cls||'');
  setTimeout(function(){t.className='toast';},3000);
}
function loadSheets(){
  var SHEETS='https://docs.google.com/spreadsheets/d/e/2PACX-1vRtxvbeKkUnyJ4CAi6kTtmQJtslPcbSsH4t8ZzUDfXcUIHFXrG3igkB5AvoyqntV8EzycO1hIDh-z4t/pub?gid=493970109&single=true&output=csv';
  fetch(SHEETS+'&t='+Date.now())
    .then(function(r){return r.text();})
    .then(function(txt){parseAndLoad(txt);})
    .catch(function(){});
}
function parseAndLoad(txt){
  txt=txt.replace(/^\uFEFF/,'');
  var lines=txt.trim().split(/\r?\n/);if(lines.length<2)return;
  var fl=lines[0];
  var sep=fl.includes('\t')?'\t':fl.includes(';')?';':',';
  var norm=function(s){return s.replace(/"/g,'').trim().toLowerCase();};
  var H=fl.split(sep).map(norm);
  var ipl=H.findIndex(function(h){return h.includes('planifi');});
  var itech=H.findIndex(function(h){return h.includes('technicien')||h==='nom';});
  var iap=H.findIndex(function(h){return h==='act/prod'||h.includes('act');});
  var icp=H.findIndex(function(h){return h==='cp';});
  var ivil=H.findIndex(function(h){return h.includes('ville');});
  var ind=H.findIndex(function(h){return h==='nd';});
  var icre=H.findIndex(function(h){return h.includes('cree')||h.includes('creation');});
  var raw=[];
  for(var n=1;n<lines.length;n++){
    var c=lines[n].split(sep).map(function(x){return x.replace(/"/g,'').trim();});
    if(c.length<3)continue;
    var g=function(i){return i>=0?(c[i]||'').trim():'';};
    var nd=g(ind).replace(/^0+/,'');
    if(!nd)continue;
    raw.push({id:nd,tech:(g(itech)||'N/A').toUpperCase(),actprod:g(iap).toUpperCase(),cp:g(icp),ville:g(ivil).toUpperCase(),date_creation:g(icre),planifiee:g(ipl),delai:48});
  }
  if(raw.length>0){initData(raw);updateApp();toast(raw.length+' dossiers','t-green');}
}
